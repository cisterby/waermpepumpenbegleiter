<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A4731"/>
      <stop offset="100%" stop-color="#3DA16A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <!-- Heat waves (3 arcs) representing warmth -->
  <path d="M160 100 Q180 130 160 160" stroke="#D97706" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M200 80 Q220 120 200 160" stroke="#D97706" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M240 100 Q260 130 240 160" stroke="#D97706" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Stylized "WB" letterform -->
  <text x="256" y="360" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="260" fill="white" text-anchor="middle" dominant-baseline="central" letter-spacing="-10">W</text>
  <!-- Small leaf accent -->
  <path d="M370 130 Q400 90 430 130 Q400 140 370 130Z" fill="#3DA16A" opacity="0.8"/>
</svg>
